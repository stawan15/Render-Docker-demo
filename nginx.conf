server {
    listen 10000;          # Render expects port 10000 by default
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files; fall back to index.html for SPA-style routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript;
}
