<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Render + Docker Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #0f0f11;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 640px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #1e1e2e;
        border: 1px solid #2d2d3f;
        border-radius: 9999px;
        padding: 0.35rem 1rem;
        font-size: 0.8rem;
        color: #a78bfa;
        margin-bottom: 2rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .badge span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a78bfa;
        display: inline-block;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }

      h1 {
        font-size: 3rem;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 1.1rem;
        color: #94a3b8;
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .stack {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 2.5rem;
      }

      .chip {
        background: #1e1e2e;
        border: 1px solid #2d2d3f;
        border-radius: 8px;
        padding: 0.5rem 1.1rem;
        font-size: 0.9rem;
        color: #cbd5e1;
      }

      .footer {
        font-size: 0.8rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge"><span></span> Live on Render</div>
      <h1>Render + Docker</h1>
      <p>
        This static page is served by <strong>Nginx</strong> inside a
        <strong>Docker</strong> container, deployed on
        <strong>Render</strong>. Push to your repo and Render rebuilds
        automatically.
      </p>
      <div class="stack">
        <div class="chip">HTML</div>
        <div class="chip">Nginx</div>
        <div class="chip">Docker</div>
        <div class="chip">Render</div>
      </div>
      <div class="footer">Edit index.html, push, and watch it redeploy.</div>
    </div>
  </body>
</html>
